name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['package--release_created'] }}
      release_pr_number: ${{ steps.find-pr.outputs.pr_number }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Resolve open release-please PR number
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # The action only emits `pr` when it just opened or updated the PR.
          # On reruns where nothing changed (e.g. workflow_dispatch with the
          # release PR already in the desired state), the output is empty.
          # Fall back to looking up the open release-please PR by its label
          # so the docs-update job can still chain off it.
          PR_FROM_ACTION='${{ steps.release.outputs.pr && fromJson(steps.release.outputs.pr).number || '' }}'
          if [ -n "$PR_FROM_ACTION" ]; then
            echo "pr_number=$PR_FROM_ACTION" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PR_NUMBER=$(gh pr list \
            --label 'autorelease: pending' \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          echo "pr_number=${PR_NUMBER:-}" >> "$GITHUB_OUTPUT"

  docs-update:
    # Runs whenever release-please has an open release PR (newly created or
    # updated). Lives in this workflow rather than a separate `pull_request`
    # workflow because PRs opened by GITHUB_TOKEN do not trigger downstream
    # `pull_request` events. Chaining inside the same workflow run avoids the
    # need for a PAT or GitHub App token.
    needs: release-please
    if: needs.release-please.outputs.release_pr_number != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    concurrency:
      group: docs-update-${{ needs.release-please.outputs.release_pr_number }}
      cancel-in-progress: true
    steps:
      - name: Checkout repo (full history for tag diffs)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Determine release version and previous tag
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.release-please.outputs.release_pr_number }}
        run: |
          set -euo pipefail
          # release-please writes the next version into the manifest before
          # opening the PR, so reading it from the PR head is reliable.
          gh pr checkout "$PR_NUMBER"
          NEXT_VERSION=$(jq -r '.package' .release-please-manifest.json)
          git checkout main
          PREV_TAG=$(git describe --tags --abbrev=0 --match 'v*' --exclude '*-rc*' 2>/dev/null || echo "")
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "docs_branch=docs/release-v$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Prepare docs branch
        env:
          DOCS_BRANCH: ${{ steps.ctx.outputs.docs_branch }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # If the docs branch already exists on the remote (i.e. the
          # docs PR is already open from a prior run, possibly with
          # manual fixes on top), branch from there so the agent
          # incrementally updates instead of starting from scratch.
          # Otherwise branch from main.
          if git fetch origin "$DOCS_BRANCH" 2>/dev/null; then
            git checkout -B "$DOCS_BRANCH" "origin/$DOCS_BRANCH"
            # Bring the branch up to date with main without losing local
            # commits. If main has moved forward, merge it in.
            git merge --no-edit origin/main || {
              echo "::warning::Merge from main into $DOCS_BRANCH had conflicts; falling back to main and dropping prior docs branch state."
              git merge --abort || true
              git checkout -B "$DOCS_BRANCH" origin/main
            }
          else
            git checkout -B "$DOCS_BRANCH" origin/main
          fi

      - name: Collect release context
        id: collect
        env:
          PREV_TAG: ${{ steps.ctx.outputs.previous_tag }}
          NEXT_VERSION: ${{ steps.ctx.outputs.next_version }}
          PR_NUMBER: ${{ needs.release-please.outputs.release_pr_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p .release-context

          # Extract just the upcoming-version section from the release PR body.
          gh pr view "$PR_NUMBER" --json body --jq '.body' > .release-context/release-pr-body.md

          # Diff of package source between previous release tag and main.
          if [ -n "$PREV_TAG" ]; then
            git diff "$PREV_TAG"..HEAD -- 'package/src/**' > .release-context/package-src.diff || true
            git log --oneline "$PREV_TAG"..HEAD -- 'package/src/**' > .release-context/package-src.log || true
          else
            echo "(no previous tag; first release)" > .release-context/package-src.diff
          fi

          # File list of pages that already exist (helps the agent avoid duplicates).
          find docs/content/docs -type f -name '*.mdx' | sort > .release-context/existing-pages.txt

      - name: Run Claude Code to update docs
        uses: anthropics/claude-code-base-action@v0.0.63
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Pin an explicit model. Without this the action falls back to
          # the CLI's built-in default, which was the retired
          # `claude-sonnet-4-20250514` and made every run fail with a
          # 404 not_found_error. `fallback_model` guards against the
          # pinned model being unavailable on a future run.
          model: "claude-sonnet-4-6"
          fallback_model: "claude-sonnet-4-5"
          # NB: at v0.0.63 the action exposes discrete inputs rather than
          # the newer `claude_args` interface. Use `allowed_tools` /
          # `max_turns` directly — passing `claude_args` here is silently
          # ignored. There is no `permission_mode` input at this version;
          # the action's default already allows headless writes.
          allowed_tools: "Read,Edit,Write,Bash,Grep,Glob"
          max_turns: "150"
          # Leaves 2 minutes for commit/push/PR steps under the 30-min
          # job-level timeout. The agent will exit early if it finishes
          # before the wall clock; this is a ceiling, not a target.
          timeout_minutes: "28"
          prompt: |
            You are updating the documentation for the @pipecat-ai/voice-ui-kit
            release v${{ steps.ctx.outputs.next_version }} (previous release:
            ${{ steps.ctx.outputs.previous_tag }}).

            ## Inputs available to you
            - `.release-context/release-pr-body.md` — the release-please PR body,
              which contains the proposed changelog for this release.
            - `.release-context/package-src.diff` — the full diff of
              `package/src/**` from the previous release to current main.
            - `.release-context/package-src.log` — commit log for the same range.
            - `.release-context/existing-pages.txt` — every existing docs page.
            - `docs/content/docs/**/*.mdx` — current docs (read and edit).
            - `package/src/**` — current source (read only).

            **Note on incremental runs.** This workflow may run multiple
            times for the same release as the release-please PR is
            updated. The docs branch is preserved between runs, so the
            current state of `docs/content/docs/**/*.mdx` may already
            include changelog entries for the upcoming version (from a
            prior agent run) and possibly manual fixes on top. Treat
            existing changes as authoritative: don't duplicate changelog
            entries you've already added, don't re-apply prose changes
            that are already reflected, and don't overwrite manual
            edits that look intentional. Only add what's missing.

            ## What to do
            For every change in the diff that affects a public export
            (component, hook, util, template, visualizer, panel, primitive,
            type), update the corresponding docs page. Specifically:

            1. **Update prose & prop tables** so they match the current
               implementation. Pay attention to renamed props, new props,
               removed props, changed defaults, and changed types.
            2. **Append a per-page changelog entry** to the page's frontmatter
               under the `changelog` field. Each page's changelog is a list,
               newest first. The new entry uses:
                 - `version: "v${{ steps.ctx.outputs.next_version }}"`
                 - `date: "${{ steps.ctx.outputs.today }}"`
                 - `changes:` a list of short, user-facing bullets describing
                   only what changed for THIS page (not the whole release).
               Skip the changelog entry on a page if nothing on that page
               actually changed.
            3. **Verify the `source` frontmatter field** points to the correct
               implementation file(s) under `package/src/`. Must be a
               repo-relative path (single string or array of strings).
               Never put a package name like `@pipecat-ai/client-react`
               in this field — the View source button generates a GitHub
               link from it. If the documented export has been moved
               entirely to an external package, point `source` at the
               re-export site (typically `package/src/.../index.ts`) and
               note the upstream location in the prose.
            4. **Create new docs pages** for any newly exported public API
               that has no corresponding page. Place them in the matching
               folder under `docs/content/docs/` (components, hooks, panels,
               primitives, templates, visualizers). Follow the structure of
               existing pages: frontmatter (title, description, source,
               changelog), prose, `<TypeTable>` for props, `<LiveComponent>`
               examples where it makes sense.
            5. **Do not delete pages** for removed exports. Instead, add a
               changelog entry noting the removal and add a banner at the top
               of the page explaining the removal. Flag these in your summary.

            ## Formatting conventions
            - Wrap component, hook, prop, type, and identifier names in
              backtick code spans. Applies to changelog bullets and prose.
              Examples: `` `Conversation` ``, `` `usePipecatConversation` ``,
              `` `noTextInput` ``, `` `FunctionCallData` ``,
              `` `ConversationMessage.role` ``.
            - When mentioning an external `@pipecat-ai/*` package in
              prose, render it as a link to its GitHub repo. Use:
                - `[`@pipecat-ai/client-js`](https://github.com/pipecat-ai/pipecat-client-web)`
                - `[`@pipecat-ai/client-react`](https://github.com/pipecat-ai/pipecat-client-web)`
                - `[`@pipecat-ai/daily-transport`](https://github.com/pipecat-ai/pipecat-client-web-transports)`
                - `[`@pipecat-ai/small-webrtc-transport`](https://github.com/pipecat-ai/pipecat-client-web-transports)`
              In `changelog` frontmatter bullets, use only backticks for
              package names (no markdown link), since the changelog
              renderer does not parse links.
            - When you edit a `<LiveComponent>` example, ensure the
              resulting code can render. Components that read from
              `PipecatClientProvider` (anything that uses
              `useConversationContext`, `usePipecatClient`, etc.) need
              `withPipecat` on the `<LiveComponent>` opening tag.
              Removing a `<ConversationProvider>` wrapper without adding
              `withPipecat` will produce a runtime error on the page.

            ## Constraints
            - Edit only files under `docs/content/docs/` and (for source
              verification) read `package/src/`. Do not touch
              `package/CHANGELOG.md`, the manifest, or the release config.
            - Match the existing prose style. Do not use em dashes.
            - Keep changelog bullets factual and short. No marketing language.
            - Always end MDX files with a trailing newline.
            - If something is ambiguous, leave a clear `{/* TODO: ... */}`
              MDX comment in the page rather than guessing.

            ## Final output
            After making edits, write a summary to
            `.release-context/agent-summary.md` containing:
              - Pages updated (with one-line reason each)
              - New pages created
              - Pages flagged for human review (and why)
              - Any exports you couldn't map to a page

      - name: Commit and push docs updates
        id: commit
        env:
          DOCS_BRANCH: ${{ steps.ctx.outputs.docs_branch }}
          NEXT_VERSION: ${{ steps.ctx.outputs.next_version }}
        run: |
          set -euo pipefail
          # Strip the throwaway context dir before committing.
          rm -rf .release-context
          git add docs/content/docs
          # `changed` covers two cases: the agent edited files in this
          # run, or a merge with main brought in new commits. Either way
          # we have something worth pushing.
          if git diff --cached --quiet && [ "$(git rev-parse HEAD)" = "$(git rev-parse "origin/$DOCS_BRANCH" 2>/dev/null || git rev-parse origin/main)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git diff --cached --quiet; then
            git commit -m "docs: update for v$NEXT_VERSION"
          fi
          # Fast-forward push (the branch was either freshly created from
          # main, or extended on top of its own previous tip). No force
          # is needed in the common path.
          git push origin "$DOCS_BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update docs PR
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCS_BRANCH: ${{ steps.ctx.outputs.docs_branch }}
          NEXT_VERSION: ${{ steps.ctx.outputs.next_version }}
          RELEASE_PR_NUMBER: ${{ needs.release-please.outputs.release_pr_number }}
        run: |
          set -euo pipefail
          EXISTING=$(gh pr list --head "$DOCS_BRANCH" --base main --state open --json number --jq '.[0].number' || true)
          BODY=$(printf "Generated docs updates for the upcoming v%s release.\n\nPaired with #%s. Review and merge after the release lands.\n\nThis PR is regenerated automatically every time the release-please PR is updated. Manual edits on this branch will be overwritten." "$NEXT_VERSION" "$RELEASE_PR_NUMBER")
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --title "docs: update for v$NEXT_VERSION" --body "$BODY"
          else
            gh pr create \
              --base main \
              --head "$DOCS_BRANCH" \
              --title "docs: update for v$NEXT_VERSION" \
              --body "$BODY"
          fi

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        working-directory: package
        run: pnpm build

      - name: Publish to NPM
        working-directory: package
        run: pnpm publish --no-git-checks --provenance
